<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Should I?</title>

  <style>
    html, body { height:100%; margin:0; }

    body{
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:radial-gradient(circle at top,#1b1b1b,#070707 60%);
      color:#f5f5f5;
      text-align:center;
      overflow:hidden;
    }

    .back{
      position:fixed;
      top:18px;
      left:18px;
      color:#f5f5f5;
      opacity:.65;
      text-decoration:none;
      font-weight:800;
      font-size:26px;
      z-index:10;
    }

    .wrap{
      width:min(520px,92vw);
      padding:24px;
    }

    .title{
      font-size:14px;
      letter-spacing:.18em;
      opacity:.55;
      margin-bottom:18px;
      font-weight:900;
    }

    .card{
      background:linear-gradient(180deg,#151515,#0d0d0d);
      border:1px solid #252525;
      border-radius:30px;
      padding:34px 22px;
      box-shadow:0 24px 80px rgba(0,0,0,.55);
    }

    .puck-wrap{
      height:230px;
      display:grid;
      place-items:center;
      margin-bottom:14px;
    }

    .puck{
      width:180px;
      height:180px;
      border-radius:50%;
      background:#050505;
      border:8px solid #2b2b2b;
      display:grid;
      place-items:center;
      overflow:hidden;
      box-shadow:
        inset 0 0 22px rgba(255,255,255,.12),
        inset 0 0 55px rgba(0,0,0,.6),
        0 24px 48px rgba(0,0,0,.75);
      transition:.35s ease;
    }

    .puck.thinking{
      animation:spin 1.1s linear infinite, blueGlow 1s infinite alternate;
    }

    .puck.do{
      box-shadow:
        inset 0 0 22px rgba(255,255,255,.12),
        0 0 42px rgba(95,215,255,.75),
        0 24px 48px rgba(0,0,0,.75);
    }

    .puck.dont{
      box-shadow:
        inset 0 0 22px rgba(255,255,255,.12),
        0 0 42px rgba(255,80,80,.55),
        0 24px 48px rgba(0,0,0,.75);
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @keyframes blueGlow{
      from{ filter:drop-shadow(0 0 0 rgba(95,215,255,0)); }
      to{ filter:drop-shadow(0 0 30px rgba(95,215,255,.7)); }
    }

    .puck img{
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scale(1.08);
    }

    .status{
      min-height:30px;
      font-size:18px;
      opacity:.65;
      font-weight:750;
      margin-bottom:14px;
    }

    #answer{
      font-size:clamp(48px,12vw,110px);
      font-weight:950;
      letter-spacing:-.05em;
      opacity:0;
      transform:scale(.9);
      transition:.35s ease;
      user-select:none;
      padding:0 16px;
      min-height:120px;
      display:grid;
      place-items:center;
    }

    #answer.show{
      opacity:1;
      transform:scale(1);
    }

    #answer.do{
      color:#ffffff;
      text-shadow:0 0 34px rgba(95,215,255,.55);
    }

    #answer.dont{
      color:#ffffff;
      text-shadow:0 0 34px rgba(255,80,80,.45);
    }

    .lock{
      margin-top:8px;
      font-size:14px;
      opacity:.45;
      min-height:22px;
    }
  </style>
</head>

<body>
  <a class="back" href="./">←</a>

  <div class="wrap">
    <div class="title">PUCKNOWS VERDICT</div>

    <div class="card">
      <div class="puck-wrap">
        <div class="puck thinking" id="puck">
          <img src="./logo.png" alt="PucKnows logo">
        </div>
      </div>

      <div class="status" id="status">PucKnows is thinking...</div>
      <div id="answer">…</div>
      <div class="lock" id="lock"></div>
    </div>
  </div>

  <script>
    const LOCK_MS = 45 * 1000;
    const THINK_MS = 1200;
    const KEY = "should_lock_v2";

    const puck = document.getElementById("puck");
    const answerEl = document.getElementById("answer");
    const statusEl = document.getElementById("status");
    const lockEl = document.getElementById("lock");

    function pick(){
      return Math.random() < 0.5 ? "DO IT" : "DON’T";
    }

    function showLock(until){
      const left = Math.max(0, Math.ceil((until - Date.now()) / 1000));
      lockEl.textContent = left > 0 ? `Locked for ${left}s` : "";
    }

    function reveal(text, until, instant = false){
      const isDo = text === "DO IT";

      puck.classList.remove("thinking");
      puck.classList.add(isDo ? "do" : "dont");

      statusEl.textContent = isDo ? "✅ PucKnows says..." : "❌ PucKnows says...";
      answerEl.textContent = text;
      answerEl.classList.add("show", isDo ? "do" : "dont");

      if (navigator.vibrate && !instant) {
        navigator.vibrate(isDo ? [40,30,90] : [80,40,80]);
      }

      showLock(until);
      setInterval(() => showLock(until), 1000);
    }

    const now = Date.now();
    let saved = null;

    try {
      saved = JSON.parse(localStorage.getItem(KEY) || "null");
    } catch {}

    if (saved && saved.until > now && saved.answer) {
      statusEl.textContent = "Saved verdict";
      reveal(saved.answer, saved.until, true);
    } else {
      const answer = pick();
      const until = now + LOCK_MS;

      localStorage.setItem(KEY, JSON.stringify({ answer, until }));

      let ticks = 0;
      const thinking = setInterval(() => {
        ticks++;
        statusEl.textContent = ticks % 2 ? "Thinking..." : "Consulting the puck...";
        if (navigator.vibrate) navigator.vibrate(8);
      }, 280);

      setTimeout(() => {
        clearInterval(thinking);
        reveal(answer, until);
      }, THINK_MS);
    }
  </script>
</body>
</html>
