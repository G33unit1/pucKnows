<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bill Splitter</title>

<style>

html,body{
margin:0;
min-height:100%;
}

body{
display:grid;
place-items:center;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
background:radial-gradient(circle at top,#1b1b1b,#070707 60%);
color:#f5f5f5;
}

.wrap{
width:min(520px,92vw);
padding:28px 22px;
text-align:center;
}

.logo{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin-bottom:16px;
box-shadow:0 0 35px rgba(95,215,255,.35);
}

.title{
font-size:13px;
letter-spacing:.2em;
opacity:.5;
font-weight:900;
margin-bottom:8px;
}

h1{
margin:0 0 22px;
font-size:clamp(30px,7vw,44px);
font-weight:950;
letter-spacing:-.05em;
}

.card{
background:linear-gradient(180deg,#151515,#0d0d0d);
border:1px solid #252525;
border-radius:30px;
padding:24px;
box-shadow:0 24px 80px rgba(0,0,0,.55);
}

label{
display:block;
text-align:left;
margin:14px 0 8px;
font-size:14px;
font-weight:800;
opacity:.72;
}

input{
width:100%;
box-sizing:border-box;
padding:16px;
border-radius:20px;
border:1px solid #2c2c2c;
background:#090909;
color:white;
font-size:22px;
outline:none;
}

input:focus{
border-color:#5fd7ff;
box-shadow:0 0 0 3px rgba(95,215,255,.18);
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.tips{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:14px;
}

.tip{
background:#090909;
border:1px solid #2b2b2b;
border-radius:15px;
padding:12px;
font-weight:900;
color:white;
cursor:pointer;
transition:.15s;
}

.tip.active{
border-color:#5fd7ff;
box-shadow:0 0 18px rgba(95,215,255,.25);
color:#5fd7ff;
}

.roundBox{
margin-top:18px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:16px;
font-weight:700;
}

.roundBox input{
width:22px;
height:22px;
accent-color:#5fd7ff;
}

.summary{

margin-top:22px;

background:#090909;

border:1px solid #252525;

border-radius:24px;

padding:20px;

}

.line{

display:flex;

justify-content:space-between;

margin:10px 0;

opacity:.72;

font-size:16px;

}

.each{

margin-top:20px;

padding-top:20px;

border-top:1px solid #252525;

}

.eachLabel{

font-size:14px;

opacity:.55;

letter-spacing:.15em;

font-weight:900;

}

.eachValue{

font-size:clamp(44px,12vw,72px);

font-weight:950;

margin-top:8px;

text-shadow:0 0 26px rgba(95,215,255,.45);

transition:.2s;

}

.eachValue.pop{

animation:pop .25s;

}

@keyframes pop{

0%{transform:scale(.9);}

50%{transform:scale(1.08);}

100%{transform:scale(1);}

}

.buttons{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

margin-top:22px;

}

.action{

border:0;

border-radius:22px;

padding:18px;

font-size:18px;

font-weight:900;

cursor:pointer;

transition:.15s;

}

.share{

background:#5fd7ff;

color:#071018;

}

.whopays{

background:#151515;

color:white;

border:1px solid #303030;

}

.action:active{

transform:scale(.98);

}

.back{

display:inline-block;

margin-top:24px;

text-decoration:none;

color:white;

opacity:.65;

}

</style>
</head>

<body>

<div class="wrap">

<img src="./logo.png" class="logo">

<div class="title">

PUCKNOWS BILL SPLITTER

</div>

<h1>

Split the damage

</h1>

<div class="card">

<label>Total Bill</label>

<input id="bill" value="100">

<div class="row">

<div>

<label>People</label>

<input id="people" value="4">

</div>

<div>

<label>Tip %</label>

<input id="tip" value="15">

</div>

</div>

<div class="tips">

<button class="tip">0%</button>

<button class="tip">10%</button>

<button class="tip active">15%</button>

<button class="tip">20%</button>

<button class="tip">25%</button>

</div>

<div class="roundBox">

<input type="checkbox" id="roundUp">

<label for="roundUp" style="margin:0;">
💰 Round each share up
</label>

</div>
<div class="summary">
  <div class="line">
    <span>Bill</span>
    <strong id="billAmount">$100.00</strong>
  </div>

  <div class="line">
    <span>Tip</span>
    <strong id="tipAmount">$15.00</strong>
  </div>

  <div class="line">
    <span>Total</span>
    <strong id="totalAmount">$115.00</strong>
  </div>

  <div class="each">
    <div class="eachLabel">EACH PERSON PAYS</div>
    <div class="eachValue" id="eachPerson">$28.75</div>
  </div>
</div>

<div class="buttons">
  <button class="action share" id="shareBtn">📤 Share</button>
  <button class="action whopays" id="whoBtn">🎉 Who Pays?</button>
</div>

<div class="back">
  <a class="back" href="./index.html">← Back</a>
</div>
<script>

const bill=document.getElementById("bill");
const people=document.getElementById("people");
const tip=document.getElementById("tip");
const round=document.getElementById("roundUp");

const billAmount=document.getElementById("billAmount");
const tipAmount=document.getElementById("tipAmount");
const totalAmount=document.getElementById("totalAmount");
const eachPerson=document.getElementById("eachPerson");

const shareBtn=document.getElementById("shareBtn");
const whoBtn=document.getElementById("whoBtn");

const tipButtons=document.querySelectorAll(".tip");

function money(v){
    return "$"+v.toFixed(2);
}

function animateResult(){
    eachPerson.classList.remove("pop");
    void eachPerson.offsetWidth;
    eachPerson.classList.add("pop");
}

function calculate(){

    let b=parseFloat(bill.value);
    let p=parseInt(people.value);
    let t=parseFloat(tip.value);

    if(isNaN(b)||b<0)b=0;
    if(isNaN(p)||p<1)p=1;
    if(isNaN(t)||t<0)t=0;

    const tipValue=b*(t/100);

    const total=b+tipValue;

    let each=total/p;

    if(round.checked){
        each=Math.ceil(each);
    }

    billAmount.textContent=money(b);
    tipAmount.textContent=money(tipValue);
    totalAmount.textContent=money(total);
    eachPerson.textContent=money(each);

    animateResult();

    tipButtons.forEach(btn=>{
        btn.classList.toggle(
            "active",
            parseFloat(btn.textContent)==t
        );
    });

}

[bill,people,tip].forEach(el=>{
    el.addEventListener("input",calculate);
});

round.addEventListener("change",calculate);

tipButtons.forEach(btn=>{

    btn.onclick=()=>{

        tip.value=parseFloat(btn.textContent);

        calculate();

        if(navigator.vibrate){
            navigator.vibrate(10);
        }

    };

});

shareBtn.onclick=async()=>{

    const text=
`Bill: ${billAmount.textContent}
Tip: ${tipAmount.textContent}
Total: ${totalAmount.textContent}

Each person pays ${eachPerson.textContent}

Calculated with PucKnows`;

    if(navigator.share){

        try{

            await navigator.share({
                title:"Bill Split",
                text:text
            });

        }catch{}

    }else{

        navigator.clipboard.writeText(text);

        alert("Copied to clipboard.");

    }

};

whoBtn.onclick=()=>{

    let p=parseInt(people.value);

    if(isNaN(p)||p<1)p=1;

    let count=0;

    const interval=setInterval(()=>{

        count++;

        const random=Math.floor(Math.random()*p)+1;

        whoBtn.textContent="👤 Person "+random;

        if(navigator.vibrate){
            navigator.vibrate(8);
        }

        if(count>18){

            clearInterval(interval);

            const winner=Math.floor(Math.random()*p)+1;

            whoBtn.textContent="🎉 Person "+winner+" Pays!";

            if(navigator.vibrate){
                navigator.vibrate([40,30,90]);
            }

            setTimeout(()=>{

                whoBtn.textContent="🎉 Who Pays?";

            },3500);

        }

    },90);

};

calculate();

</script>

</body>
</html>
