<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bill Splitter</title>

<style>
html,body{
  margin:0;
  min-height:100%;
}

body{
  display:grid;
  place-items:center;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(circle at top,#1b1b1b,#070707 60%);
  color:#f5f5f5;
}

.wrap{
  width:min(520px,92vw);
  padding:28px 22px;
  text-align:center;
}

.logo{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:16px;
  box-shadow:0 0 35px rgba(95,215,255,.35);
}

.title{
  font-size:13px;
  letter-spacing:.2em;
  opacity:.5;
  font-weight:900;
  margin-bottom:8px;
}

h1{
  margin:0 0 22px;
  font-size:clamp(30px,7vw,44px);
  font-weight:950;
  letter-spacing:-.05em;
}

.card{
  background:linear-gradient(180deg,#151515,#0d0d0d);
  border:1px solid #252525;
  border-radius:30px;
  padding:24px;
  box-shadow:0 24px 80px rgba(0,0,0,.55);
}

label{
  display:block;
  text-align:left;
  margin:14px 0 8px;
  font-size:14px;
  font-weight:800;
  opacity:.72;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:16px;
  border-radius:20px;
  border:1px solid #2c2c2c;
  background:#090909;
  color:white;
  font-size:22px;
  outline:none;
}

input:focus{
  border-color:#5fd7ff;
  box-shadow:0 0 0 3px rgba(95,215,255,.18);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.names{
  margin-top:18px;
  display:grid;
  gap:10px;
}

.nameInput{
  font-size:18px;
  padding:14px 16px;
}

.tips{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-top:14px;
}

.tip{
  background:#090909;
  border:1px solid #2b2b2b;
  border-radius:15px;
  padding:12px 6px;
  font-weight:900;
  color:white;
  cursor:pointer;
}

.tip.active{
  border-color:#5fd7ff;
  box-shadow:0 0 18px rgba(95,215,255,.25);
  color:#5fd7ff;
}

  .results{
  margin-top:22px;
  background:#090909;
  border:1px solid #2b2b2b;
  border-radius:22px;
  padding:18px;
}

.resultLabel{
  font-size:14px;
  opacity:.55;
  margin-bottom:8px;
  font-weight:800;
}

.resultAmount{
  font-size:44px;
  font-weight:950;
  letter-spacing:-.04em;
  color:#5fd7ff;
  text-shadow:0 0 22px rgba(95,215,255,.25);
}

.resultEach{
  margin-top:12px;
  font-size:17px;
  opacity:.75;
}

.options{
  display:grid;
  gap:12px;
  margin-top:22px;
}

.btn{
  width:100%;
  border:0;
  border-radius:22px;
  padding:18px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  transition:.18s ease;
}

.btn:active{
  transform:scale(.98);
}

.primary{
  background:#5fd7ff;
  color:#08131a;
}

.secondary{
  background:#161616;
  color:white;
  border:1px solid #2c2c2c;
}

.share{
  background:#0d0d0d;
  color:white;
  border:1px solid #2b2b2b;
}

.back{
  display:inline-block;
  margin-top:24px;
  color:white;
  opacity:.65;
  text-decoration:none;
  font-weight:700;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(5,5,5,.96);
  display:grid;
  place-items:center;
  z-index:999;
}

.hidden{
  display:none;
}

.overlayContent{
  text-align:center;
  padding:30px;
}

.overlayLogo{
  width:180px;
  height:180px;
  border-radius:50%;
  box-shadow:0 0 55px rgba(95,215,255,.6);
}

.spin{
  animation:spin 1s linear infinite;
}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

.overlayTitle{
  margin-top:22px;
  font-size:15px;
  letter-spacing:.22em;
  opacity:.6;
  font-weight:900;
}

.overlayName{
  margin-top:34px;
  min-height:56px;
  font-size:48px;
  font-weight:950;
}

.overlayResult{
  margin-top:26px;
  font-size:56px;
  font-weight:950;
  color:#5fd7ff;
  text-shadow:0 0 30px rgba(95,215,255,.45);
}

</style>
</head>

  <body>

<div class="wrap">
  <img src="./logo.png" class="logo" alt="PucKnows logo">

  <div class="title">PUCKNOWS BILL SPLITTER</div>
  <h1>Split the damage</h1>

  <div class="card">
    <label for="bill">💰 Total bill</label>
    <input id="bill" inputmode="decimal" value="100">

    <div class="row">
      <div>
        <label for="people">👥 People</label>
        <input id="people" inputmode="numeric" value="2">
      </div>

      <div>
        <label for="tip">🎁 Tip %</label>
        <input id="tip" inputmode="decimal" value="15">
      </div>
    </div>

    <div class="names" id="names"></div>

    <div class="tips">
      <button class="tip" data-tip="0">0%</button>
      <button class="tip" data-tip="10">10%</button>
      <button class="tip active" data-tip="15">15%</button>
      <button class="tip" data-tip="20">20%</button>
      <button class="tip" data-tip="25">25%</button>
    </div>

    <div class="options">
      <button class="btn secondary" id="roundBtn">💰 Round each share: OFF</button>
    </div>

    <div class="results">
      <div class="resultLabel">EACH PERSON PAYS</div>
      <div class="resultAmount" id="eachAmount">$57.50</div>
      <div class="resultEach" id="summaryText">Bill $100.00 · Tip $15.00 · Total $115.00</div>
    </div>

    <div class="options">
      <button class="btn share" id="shareBtn">📤 Share result</button>
      <button class="btn primary" id="whoBtn">🎉 Gamble - who's paying?</button>
    </div>
  </div>

  <a class="back" href="./index.html">← Back</a>
</div>

<div id="whoOverlay" class="overlay hidden">
  <div class="overlayContent">
    <img src="./logo.png" class="overlayLogo" id="overlayLogo" alt="PucKnows logo">

    <div class="overlayTitle">CONSULTING THE PUCK...</div>
    <div class="overlayName" id="overlayName">Person 1</div>
    <div class="overlayResult" id="overlayResult"></div>
  </div>
</div>

  <script>
const billInput = document.getElementById("bill");
const peopleInput = document.getElementById("people");
const tipInput = document.getElementById("tip");

const namesBox = document.getElementById("names");
const eachAmount = document.getElementById("eachAmount");
const summaryText = document.getElementById("summaryText");

const roundBtn = document.getElementById("roundBtn");
const shareBtn = document.getElementById("shareBtn");
const whoBtn = document.getElementById("whoBtn");

const tipButtons = document.querySelectorAll(".tip");

const overlay = document.getElementById("whoOverlay");
const overlayLogo = document.getElementById("overlayLogo");
const overlayName = document.getElementById("overlayName");
const overlayResult = document.getElementById("overlayResult");

let roundUp = false;
let currentEach = 0;
let currentTotal = 0;
let currentTip = 0;

function money(value){
  return "$" + value.toFixed(2);
}

function num(value){
  const n = parseFloat(value);
  return Number.isFinite(n) ? n : 0;
}

function peopleCount(){
  const p = parseInt(peopleInput.value, 10);
  return Number.isFinite(p) && p > 0 ? p : 1;
}

function buildNameInputs(){
  const count = peopleCount();

  const existing = Array.from(document.querySelectorAll(".nameInput"))
    .map(input => input.value);

  namesBox.innerHTML = "";

  for(let i = 0; i < count; i++){
    const input = document.createElement("input");
    input.className = "nameInput";
    input.placeholder = "Name " + (i + 1);
    input.value = existing[i] || "";
    namesBox.appendChild(input);
  }
}

function getNames(){
  return Array.from(document.querySelectorAll(".nameInput")).map((input, index) => {
    return input.value.trim() || "Person " + (index + 1);
  });
}

function popResult(){
  eachAmount.style.transform = "scale(1.06)";
  setTimeout(() => {
    eachAmount.style.transform = "scale(1)";
  }, 140);
}

function calculate(){
  const bill = Math.max(0, num(billInput.value));
  const tipPercent = Math.max(0, num(tipInput.value));
  const people = peopleCount();

  currentTip = bill * (tipPercent / 100);
  currentTotal = bill + currentTip;
  currentEach = currentTotal / people;

  if(roundUp){
    currentEach = Math.ceil(currentEach);
  }

  eachAmount.textContent = money(currentEach);
  summaryText.textContent =
    "Bill " + money(bill) +
    " · Tip " + money(currentTip) +
    " · Total " + money(currentTotal);

  tipButtons.forEach(button => {
    button.classList.toggle(
      "active",
      parseFloat(button.dataset.tip) === tipPercent
    );
  });

  popResult();
}

billInput.addEventListener("input", calculate);
tipInput.addEventListener("input", calculate);

peopleInput.addEventListener("input", () => {
  buildNameInputs();
  calculate();
});

tipButtons.forEach(button => {
  button.addEventListener("click", () => {
    tipInput.value = button.dataset.tip;
    calculate();

    if(navigator.vibrate){
      navigator.vibrate(10);
    }
  });
});

roundBtn.addEventListener("click", () => {
  roundUp = !roundUp;
  roundBtn.textContent = roundUp
    ? "💰 Round each share: ON"
    : "💰 Round each share: OFF";

  roundBtn.style.borderColor = roundUp ? "#5fd7ff" : "#2c2c2c";

  calculate();

  if(navigator.vibrate){
    navigator.vibrate(12);
  }
});

shareBtn.addEventListener("click", async () => {
  const text =
    "PucKnows Bill Split\n\n" +
    summaryText.textContent + "\n" +
    "Each person pays " + eachAmount.textContent;

  if(navigator.share){
    try{
      await navigator.share({
        title:"PucKnows Bill Split",
        text:text
      });
    } catch {}
  } else {
    try{
      await navigator.clipboard.writeText(text);
      alert("Copied to clipboard");
    } catch {
      alert(text);
    }
  }
});

whoBtn.addEventListener("click", () => {
  const names = getNames();

  overlay.classList.remove("hidden");
  overlayLogo.classList.add("spin");
  overlayName.textContent = "Consulting...";
  overlayResult.textContent = "";

  let count = 0;
  let delay = 70;

  function cycle(){
    const randomName = names[Math.floor(Math.random() * names.length)];
    overlayName.textContent = randomName;

    if(navigator.vibrate){
      navigator.vibrate(8);
    }

    count++;
    delay += 8;

    if(count < 30){
      setTimeout(cycle, delay);
      return;
    }

    const winner = names[Math.floor(Math.random() * names.length)];

    overlayLogo.classList.remove("spin");
    overlayName.textContent = "";
    overlayResult.textContent = "🎉 " + winner + " pays!";

    document.getElementById("resultSound").play();

    if(navigator.vibrate){
      navigator.vibrate([40,30,90]);
    }
  }

  cycle();
});

overlay.addEventListener("click", () => {
  overlay.classList.add("hidden");
  overlayLogo.classList.remove("spin");
});

buildNameInputs();
calculate();

</script>
    
<audio id="resultSound" src="ding.mp3" preload="auto"></audio>    

</body>
</html>
