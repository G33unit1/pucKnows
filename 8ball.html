<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ask PucKnows</title>
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
:root{
    --bg:#05070d;
    --text:#eef6ff;
    --muted:#8da0bc;
    --blue:#35b7ff;
    --purple:#9a62ff;
    --gold:#ffd36a;
    --border:rgba(110,190,255,.18);
    --shadow:0 30px 80px rgba(0,0,0,.55);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
    margin:0;
    min-height:100%;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:
        radial-gradient(circle at 50% -10%, rgba(50,140,255,.22), transparent 34%),
        radial-gradient(circle at 85% 18%, rgba(139,73,255,.14), transparent 24%),
        linear-gradient(180deg,#05070d,#03040a 70%,#010208);
    color:var(--text);
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size:34px 34px;
    mask-image:linear-gradient(to bottom, rgba(0,0,0,.6), transparent 80%);
}

.app{
    width:min(460px,100%);
    min-height:100svh;
    margin:0 auto;
    padding:20px 18px max(24px, env(safe-area-inset-bottom));
    display:flex;
    flex-direction:column;
    align-items:center;
}

.top{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:6px;
}

.home-link{
    color:var(--muted);
    text-decoration:none;
    font-size:14px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.04);
    border-radius:999px;
    padding:9px 12px;
}

.pill{
    font-size:12px;
    color:#b8dfff;
    border:1px solid rgba(53,183,255,.2);
    background:rgba(53,183,255,.08);
    border-radius:999px;
    padding:8px 11px;
}

header{text-align:center;margin:4px 0 10px}

h1{
    margin:0;
    font-size:clamp(30px,8vw,44px);
    letter-spacing:-1.2px;
    text-shadow:0 0 28px rgba(53,183,255,.38);
}

.subtitle{
    margin:8px auto 0;
    max-width:350px;
    color:var(--muted);
    line-height:1.35;
    font-size:14px;
}

/* Main ball */
.stage{
    position:relative;
    width:100%;
    height:300px;
    display:grid;
    place-items:center;
    margin:0 0 14px;
}

.ball-wrap{
    position:relative;
    width:min(285px,76vw);
    aspect-ratio:1;
    display:grid;
    place-items:center;
    filter:drop-shadow(0 35px 42px rgba(0,0,0,.75));
    animation:floaty 4.8s ease-in-out infinite;
}

.ball{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    background:
        radial-gradient(circle at 31% 22%, rgba(255,255,255,.33), rgba(255,255,255,.08) 10%, transparent 18%),
        radial-gradient(circle at 67% 75%, rgba(45,180,255,.18), transparent 24%),
        radial-gradient(circle at 50% 50%, #11182a 0%, #05070d 48%, #010105 73%, #000 100%);
    box-shadow:
        inset -24px -32px 50px rgba(0,0,0,.92),
        inset 20px 22px 38px rgba(255,255,255,.04),
        0 0 36px rgba(53,183,255,.38),
        0 0 var(--glowSize,72px) rgba(53,183,255,.22);
    border:1px solid rgba(255,255,255,.08);
    transition:.35s ease;
}

.ball::before{
    content:"";
    position:absolute;
    inset:7%;
    border-radius:50%;
    background:
        linear-gradient(135deg, rgba(255,255,255,.28), transparent 20%),
        radial-gradient(ellipse at 28% 20%, rgba(255,255,255,.18), transparent 28%),
        radial-gradient(ellipse at 68% 72%, rgba(53,183,255,.14), transparent 32%);
    opacity:.64;
}

.ball::after{
    content:"";
    position:absolute;
    left:18%;
    top:13%;
    width:34%;
    height:18%;
    border-radius:50%;
    background:linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,0));
    filter:blur(.5px);
    transform:rotate(-25deg);
    opacity:.65;
}

.shadow{
    position:absolute;
    bottom:5px;
    width:58%;
    height:28px;
    background:radial-gradient(ellipse, rgba(0,0,0,.72), transparent 70%);
    filter:blur(6px);
    animation:shadowPulse 4.8s ease-in-out infinite;
}

/* Blue mist answer reveal inside the puck */
.mist{
    position:absolute;
    inset:18%;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
    opacity:.62;
    filter:blur(.2px);
    background:
        radial-gradient(circle at 50% 50%, rgba(53,183,255,.28), transparent 58%),
        radial-gradient(circle at 32% 42%, rgba(0,119,255,.22), transparent 42%),
        radial-gradient(circle at 68% 60%, rgba(154,98,255,.16), transparent 42%);
    box-shadow:0 0 50px rgba(53,183,255,.18);
    z-index:3;
}

.mist::before,
.mist::after{
    content:"";
    position:absolute;
    inset:-28%;
    border-radius:50%;
    background:
        radial-gradient(ellipse at 30% 35%, rgba(74,210,255,.34), transparent 28%),
        radial-gradient(ellipse at 70% 55%, rgba(0,100,255,.28), transparent 30%),
        radial-gradient(ellipse at 50% 70%, rgba(135,100,255,.16), transparent 34%);
    filter:blur(16px);
    opacity:.75;
    animation:mistDrift 8s linear infinite;
}

.mist::after{
    animation-duration:12s;
    animation-direction:reverse;
    opacity:.52;
    transform:scale(1.15);
}

.mist-answer{
    position:relative;
    z-index:4;
    max-width:78%;
    color:#54cfff;
    font-size:clamp(18px,5.2vw,25px);
    line-height:1.08;
    font-weight:950;
    letter-spacing:.2px;
    text-transform:uppercase;
    text-shadow:
        0 0 8px rgba(53,183,255,.95),
        0 0 24px rgba(53,183,255,.75),
        0 0 48px rgba(0,119,255,.55);
    opacity:.78;
    filter:blur(.4px);
    transform:scale(.98);
    transition:opacity .45s ease, filter .45s ease, transform .45s ease;
}

.ball.thinking .mist{
    opacity:.92;
    box-shadow:0 0 75px rgba(53,183,255,.34);
}

.ball.thinking .mist-answer{
    opacity:.18;
    filter:blur(9px);
    transform:scale(.92);
}

.ball.revealed .mist{
    opacity:1;
    animation:mistPulse 2.7s ease-in-out infinite;
}

.ball.revealed .mist-answer{
    opacity:1;
    filter:blur(0);
    transform:scale(1);
    animation:answerReveal .75s ease-out both, answerGlow 2.4s ease-in-out infinite;
}

.ball.legendary{
    box-shadow:
        inset -24px -32px 50px rgba(0,0,0,.92),
        0 0 55px rgba(255,211,106,.85),
        0 0 140px rgba(255,211,106,.42);
}

.loading-msg{
    min-height:20px;
    margin-top:-8px;
    margin-bottom:8px;
    color:#b5dfff;
    font-size:14px;
    text-align:center;
}

.card{
    width:100%;
    border:1px solid var(--border);
    background:linear-gradient(180deg,rgba(12,18,32,.86),rgba(8,12,22,.88));
    box-shadow:var(--shadow);
    border-radius:26px;
    padding:16px;
}

textarea{
    width:100%;
    min-height:96px;
    border:1px solid rgba(125,195,255,.16);
    background:rgba(0,0,0,.28);
    color:var(--text);
    border-radius:20px;
    padding:15px;
    resize:none;
    outline:none;
    font:inherit;
    line-height:1.35;
}

textarea:focus{
    border-color:rgba(53,183,255,.55);
    box-shadow:0 0 0 4px rgba(53,183,255,.08);
}

textarea::placeholder{color:#60718c}

.primary,.btn{
    border:0;
    font:inherit;
    font-weight:900;
    cursor:pointer;
    border-radius:18px;
    min-height:52px;
    transition:transform .16s ease, opacity .16s ease;
}

.primary{
    width:100%;
    margin-top:12px;
    color:#03121f;
    background:linear-gradient(135deg,#6ee7ff,var(--blue),#3385ff);
    box-shadow:0 14px 30px rgba(53,183,255,.24);
}

.primary:disabled{
    opacity:.38;
    cursor:not-allowed;
    filter:grayscale(.7);
    box-shadow:none;
}

.primary:active,.btn:active{transform:scale(.98)}

.controls{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:12px 0;
}

.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid var(--border);
    background:rgba(255,255,255,.045);
    border-radius:18px;
    padding:12px;
    color:#c8d8ec;
    font-size:14px;
}

.switch{
    width:46px;
    height:26px;
    border-radius:999px;
    background:rgba(255,255,255,.13);
    position:relative;
    transition:.2s;
}

.switch::after{
    content:"";
    position:absolute;
    top:4px;
    left:4px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#fff;
    transition:.2s;
}

.toggle.on .switch{background:linear-gradient(135deg,var(--blue),var(--purple))}
.toggle.on .switch::after{left:24px}

.answer-panel{
    width:100%;
    margin-top:12px;
    text-align:center;
    min-height:28px;
    color:#bcdfff;
    font-weight:900;
    opacity:0;
    transform:translateY(8px);
    transition:.35s ease;
    line-height:1.25;
}

.answer-panel.show{
    opacity:1;
    transform:translateY(0);
}

.actions{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:14px;
}

.btn{
    min-height:48px;
    color:#dceeff;
    background:rgba(255,255,255,.07);
    border:1px solid var(--border);
    font-size:13px;
}

.btn.home{
    color:#06111d;
    background:linear-gradient(135deg,#6ee7ff,#35b7ff);
}

.sparkles,.confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:20;
}

.spark{
    position:absolute;
    width:5px;
    height:5px;
    border-radius:50%;
    background:#95e8ff;
    box-shadow:0 0 14px #6be0ff;
    animation:spark .9s ease-out forwards;
}

.confetti-piece{
    position:absolute;
    width:8px;
    height:14px;
    border-radius:2px;
    background:var(--gold);
    animation:confettiFall 1.8s ease-in forwards;
}

@keyframes floaty{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
}

@keyframes shadowPulse{
    0%,100%{transform:scale(1);opacity:.75}
    50%{transform:scale(.82);opacity:.48}
}

@keyframes shakeBall{
    0%{transform:rotate(0deg) translate(0,0)}
    20%{transform:rotate(-5deg) translate(-4px,2px)}
    40%{transform:rotate(4deg) translate(4px,-2px)}
    60%{transform:rotate(-3deg) translate(-2px,3px)}
    80%{transform:rotate(5deg) translate(3px,0)}
    100%{transform:rotate(0deg) translate(0,0)}
}

@keyframes mistDrift{
    0%{transform:rotate(0deg) translate3d(0,0,0) scale(1)}
    50%{transform:rotate(180deg) translate3d(4px,-5px,0) scale(1.08)}
    100%{transform:rotate(360deg) translate3d(0,0,0) scale(1)}
}

@keyframes mistPulse{
    0%,100%{filter:brightness(1); transform:scale(1)}
    50%{filter:brightness(1.28); transform:scale(1.03)}
}

@keyframes answerReveal{
    0%{opacity:0; filter:blur(14px); transform:scale(.86)}
    55%{opacity:.75; filter:blur(4px); transform:scale(1.04)}
    100%{opacity:1; filter:blur(0); transform:scale(1)}
}

@keyframes answerGlow{
    0%,100%{text-shadow:0 0 8px rgba(53,183,255,.95),0 0 24px rgba(53,183,255,.75),0 0 48px rgba(0,119,255,.55)}
    50%{text-shadow:0 0 12px rgba(110,231,255,1),0 0 36px rgba(53,183,255,.95),0 0 70px rgba(0,119,255,.75)}
}

@keyframes spark{
    from{transform:translate(0,0) scale(1);opacity:1}
    to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}
}

@keyframes confettiFall{
    from{transform:translateY(-10vh) rotate(0);opacity:1}
    to{transform:translateY(110vh) rotate(520deg);opacity:0}
}

@media (max-width:380px){
    .stage{height:280px}
    .actions{grid-template-columns:1fr}
    .controls{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="sparkles" id="sparkles"></div>
<div class="confetti" id="confetti"></div>

<main class="app">
    <div class="top">
        <a class="home-link" href="./index.html">← Home</a>
        <div class="pill">For Puck's Sake</div>
    </div>

    <header>
        <h1>🔮 Ask PucKnows</h1>
        <p class="subtitle">The puck knows... whether you like the answer or not.</p>
    </header>

    <section class="stage">
        <div class="ball-wrap">
            <div class="ball" id="ball">
                <div class="mist" id="mist">
                    <div class="mist-answer" id="answerText">ASK<br>THE<br>PUCK</div>
                </div>
            </div>
        </div>
        <div class="shadow"></div>
    </section>

    <div class="loading-msg" id="loadingMsg"></div>

    <section class="card">
        <textarea id="question" placeholder="What do you want to know?"></textarea>
        <button class="primary" id="askBtn" disabled>ASK THE PUCK</button>

        <div class="controls">
            <div class="toggle on" id="soundToggle">
                <span>🔊 Sound</span><span class="switch"></span>
            </div>
            <div class="toggle on" id="vibeToggle">
                <span>📳 Vibration</span><span class="switch"></span>
            </div>
        </div>

        <div class="answer-panel" id="answerPanel"></div>

        <div class="actions">
            <button class="btn" id="againBtn">Ask Again</button>
            <button class="btn" id="clearBtn">Clear Question</button>
            <button class="btn home" id="homeBtn">Home</button>
        </div>
    </section>
</main>

<audio id="resultSound" src="ding.mp3" preload="auto"></audio>
<audio id="legendSound" src="ding.mp3" preload="auto"></audio>

<script>
const questionEl = document.getElementById("question");
const askBtn = document.getElementById("askBtn");
const againBtn = document.getElementById("againBtn");
const clearBtn = document.getElementById("clearBtn");
const homeBtn = document.getElementById("homeBtn");
const ball = document.getElementById("ball");
const answerText = document.getElementById("answerText");
const loadingMsg = document.getElementById("loadingMsg");
const answerPanel = document.getElementById("answerPanel");
const soundToggle = document.getElementById("soundToggle");
const vibeToggle = document.getElementById("vibeToggle");
const sparkles = document.getElementById("sparkles");
const confetti = document.getElementById("confetti");

const LS_SOUND = "puckknows_sound_on";
const LS_VIBE = "puckknows_vibration_on";

let soundOn = localStorage.getItem(LS_SOUND) !== "false";
let vibeOn = localStorage.getItem(LS_VIBE) !== "false";
let busy = false;

const thinkingMessages = [
    "Consulting destiny...",
    "Spinning the puck...",
    "Calculating terrible life choices...",
    "One moment...",
    "Questioning your judgement...",
    "Checking with the universe...",
    "Polishing the crystal puck...",
    "The puck is warming up..."
];

const normalResponses = [
    "Absolutely.","Yes.","Without a doubt.","Go for it.","Looks promising.",
    "Very likely.","Probably.","I'd wait.","Not today.","Highly unlikely.",
    "No chance.","Definitely not.","Ask again later.","The puck refuses to answer.",
    "You're asking the wrong question.","Trust your gut.","Sleep on it.","Buy it.",
    "Walk away.","Flip a coin instead.","For Puck's Sake... NO.","For Puck's Sake... YES.",
    "Only after coffee.","Only if your wife agrees.","Proceed with caution.",
    "You already know the answer.","Don't be ridiculous.","Ask after payday.",
    "Not if crypto is involved.","The puck says behave yourself.",
    "Brave choice. Questionable, but brave.","That has bad idea written all over it.",
    "Surprisingly, yes.","Surprisingly, no.","Your future self is already annoyed.",
    "Do it, but don't blame the puck.","Give it 24 hours.","Wait until tomorrow.",
    "Yes, but keep the receipt.","No, and you know it.","That is a trap.",
    "Ask your bank account first.","Strong yes energy.","Strong no energy.",
    "Looks like a win.","Looks like a lesson.","Do not poke that bear.",
    "Send it.","Abort mission.","Your wife is probably right.",
    "The puck is not impressed.","Could go either way.","Not worth the drama.",
    "Worth the risk.","Too much hassle.","Check the numbers first.",
    "The puck approves.","The puck disapproves loudly.",
    "Good idea. Bad timing.","Bad idea. Great story.",
    "The universe shrugged.","Nope. Hard nope.","Yes. Weirdly yes.",
    "Trust the puck. Regret is optional.","Don't make this a whole thing.",
    "It will cost more than you think.","The puck says keep it simple.",
    "The puck says stop overthinking.","Not today, captain chaos.",
    "Yes, legend.","No, big yin.","Aye, but don't get cocky.",
    "Naw, leave it alone.","Ask after one more cup of tea.",
    "The puck needs a lie down.","Looks decent.","Looks dodgy.",
    "This is either genius or nonsense.","The puck says: make a spreadsheet.",
    "The puck says: send it to the moon.","No leverage. No drama.",
    "Take profit first.","Walk away while you still look clever."
];

const legendaryResponses = [
    "🏆 JACKPOT!\nBuy the lottery ticket.",
    "⚠️ LEGENDARY ANSWER.\nYou may never be this lucky again.",
    "🌌 COSMIC PUCK EVENT.\nThe universe just blinked first."
];

function rand(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function updateToggles(){
    soundToggle.classList.toggle("on", soundOn);
    vibeToggle.classList.toggle("on", vibeOn);
}
updateToggles();

questionEl.addEventListener("input", () => {
    askBtn.disabled = questionEl.value.trim().length === 0 || busy;
});

soundToggle.addEventListener("click", () => {
    soundOn = !soundOn;
    localStorage.setItem(LS_SOUND, String(soundOn));
    updateToggles();
});

vibeToggle.addEventListener("click", () => {
    vibeOn = !vibeOn;
    localStorage.setItem(LS_VIBE, String(vibeOn));
    updateToggles();
});

function vibrate(pattern){
    if(vibeOn && navigator.vibrate) navigator.vibrate(pattern);
}

function playSound(legendary=false){
    if(!soundOn) return;
    const el = document.getElementById(legendary ? "legendSound" : "resultSound");
    if(el){
        el.currentTime = 0;
        el.play().catch(() => {});
    }
}

function saveHistory(q,a){
    const history = JSON.parse(localStorage.getItem("puckknows_8ball_history") || "[]");
    history.unshift({q,a,t:new Date().toISOString()});
    localStorage.setItem("puckknows_8ball_history", JSON.stringify(history.slice(0,20)));
}

function mistText(answer){
    return answer
        .replace(/^The puck says:\s*/i, "")
        .replace(/^For Puck's Sake\.\.\.\s*/i, "FPS: ")
        .replace(/\.$/, "")
        .toUpperCase();
}

function makeSparkles(count=24){
    const rect = ball.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    for(let i=0;i<count;i++){
        const s = document.createElement("span");
        s.className = "spark";
        s.style.left = cx + "px";
        s.style.top = cy + "px";
        s.style.setProperty("--x", (Math.random()*240-120) + "px");
        s.style.setProperty("--y", (Math.random()*220-130) + "px");
        sparkles.appendChild(s);
        setTimeout(() => s.remove(), 950);
    }
}

function makeConfetti(count=70){
    for(let i=0;i<count;i++){
        const c = document.createElement("span");
        c.className = "confetti-piece";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["#ffd36a","#35b7ff","#9a62ff","#42f5c8","#ff4f8b"][i%5];
        c.style.animationDelay = (Math.random()*0.35) + "s";
        confetti.appendChild(c);
        setTimeout(() => c.remove(), 2300);
    }
}

async function askPuck(){
    const q = questionEl.value.trim();
    if(!q || busy) return;

    busy = true;
    askBtn.disabled = true;
    answerPanel.classList.remove("show");
    ball.classList.remove("revealed","legendary");
    ball.classList.add("thinking");
    answerText.textContent = "";
    loadingMsg.textContent = rand(thinkingMessages);
    document.documentElement.style.setProperty("--glowSize", (70 + Math.floor(Math.random()*80)) + "px");

    vibrate([35,25,55]);

    const delay = 2000 + Math.floor(Math.random()*2000);
    await new Promise(resolve => setTimeout(resolve, delay));

    const legendary = Math.random() < 0.01;
    const answer = legendary ? rand(legendaryResponses) : rand(normalResponses);

    ball.classList.remove("thinking");
    ball.classList.add("revealed");
    if(legendary) ball.classList.add("legendary");

    answerText.textContent = mistText(answer);
    loadingMsg.textContent = "";
    answerPanel.textContent = "The puck says: " + answer.replace(/\n/g, " ");
    answerPanel.classList.add("show");

    makeSparkles(legendary ? 55 : 26);
    if(legendary) makeConfetti();

    playSound(legendary);
    vibrate(legendary ? [60,40,80,40,120] : [35,30,80]);

    saveHistory(q, answer.replace(/\n/g, " "));

    busy = false;
    askBtn.disabled = questionEl.value.trim().length === 0;
}

askBtn.addEventListener("click", askPuck);

againBtn.addEventListener("click", () => {
    if(questionEl.value.trim()) askPuck();
    else questionEl.focus();
});

clearBtn.addEventListener("click", () => {
    questionEl.value = "";
    askBtn.disabled = true;
    answerText.innerHTML = "ASK<br>THE<br>PUCK";
    answerPanel.classList.remove("show");
    loadingMsg.textContent = "";
    ball.classList.remove("thinking","revealed","legendary");
    questionEl.focus();
});

homeBtn.addEventListener("click", () => {
    window.location.href = "./index.html";
});
</script>
</body>
</html>
