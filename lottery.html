<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lottery Picker</title>

  <style>
    html, body { min-height:100%; margin:0; }

    body{
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:radial-gradient(circle at top,#1b1b1b,#070707 60%);
      color:#f5f5f5;
    }

    .wrap{
      width:min(520px,92vw);
      text-align:center;
      padding:28px 22px;
    }

    .logo{
      width:110px;
      height:110px;
      border-radius:50%;
      object-fit:cover;
      margin-bottom:16px;
      box-shadow:0 0 34px rgba(95,215,255,.35);
    }

    .title{
      font-size:13px;
      letter-spacing:.2em;
      opacity:.5;
      font-weight:900;
      margin-bottom:8px;
    }

    h1{
      margin:0 0 22px;
      font-size:clamp(30px,7vw,44px);
      font-weight:950;
      letter-spacing:-.05em;
    }

    .card{
      background:linear-gradient(180deg,#151515,#0d0d0d);
      border:1px solid #252525;
      border-radius:30px;
      padding:24px;
      box-shadow:0 24px 80px rgba(0,0,0,.55);
    }

    label{
      display:block;
      text-align:left;
      font-size:14px;
      opacity:.7;
      margin:14px 0 8px;
      font-weight:750;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:16px 18px;
      border-radius:20px;
      border:1px solid #2e2e2e;
      background:#080808;
      color:#f5f5f5;
      font-size:22px;
      outline:none;
    }

    input:focus{
      border-color:#5fd7ff;
      box-shadow:0 0 0 3px rgba(95,215,255,.15);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .btnrow{
      display:grid;
      grid-template-columns:1fr .55fr;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      border:0;
      color:#050505;
      background:linear-gradient(180deg,#ffffff,#e7e7e7);
      padding:17px 14px;
      border-radius:22px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      transition:.15s ease;
    }

    .btn:active{ transform:scale(.98); }

    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .btn.secondary{
      background:#090909;
      color:#f5f5f5;
      border:1px solid #2a2a2a;
    }

    .balls{
      margin-top:24px;
      min-height:76px;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      align-items:center;
    }

    .ball{
      width:54px;
      height:54px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 35% 25%, #ffffff, #d7d7d7 36%, #565656 100%);
      color:#050505;
      font-size:20px;
      font-weight:950;
      box-shadow:
        inset 0 -8px 16px rgba(0,0,0,.25),
        0 10px 24px rgba(0,0,0,.55);
      animation:pop .25s ease both;
    }

    .balls.loading .ball{
      animation:roll .16s linear infinite alternate;
      opacity:.8;
    }

    @keyframes pop{
      from{ transform:translateY(8px) scale(.85); opacity:0; }
      to{ transform:translateY(0) scale(1); opacity:1; }
    }

    @keyframes roll{
      from{ transform:translateY(-3px) rotate(-8deg); }
      to{ transform:translateY(3px) rotate(8deg); }
    }

    .toast{
      margin-top:12px;
      font-size:14px;
      opacity:.7;
      min-height:20px;
    }

    .hint{
      margin-top:14px;
      font-size:14px;
      opacity:.48;
    }

    .back{
      display:inline-block;
      margin-top:26px;
      color:#f5f5f5;
      opacity:.65;
      text-decoration:none;
      font-size:18px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <img class="logo" src="./logo.png" alt="PucKnows logo">

    <div class="title">PUCKNOWS LOTTERY</div>
    <h1>Pick lucky numbers</h1>

    <div class="card">
      <label for="count">How many numbers?</label>
      <input id="count" inputmode="numeric" value="6" />

      <div class="row">
        <div>
          <label for="min">Min</label>
          <input id="min" inputmode="numeric" value="1" />
        </div>

        <div>
          <label for="max">Max</label>
          <input id="max" inputmode="numeric" value="49" />
        </div>
      </div>

      <div class="btnrow">
        <button class="btn" id="go">🍀 Pick</button>
        <button class="btn secondary" id="copy" disabled>Copy</button>
      </div>

      <div class="balls" id="balls">
        <div class="ball">—</div>
      </div>

      <div class="toast" id="toast"></div>
      <div class="hint">Unique picks. No repeats. Tap again to repick.</div>
    </div>

    <a class="back" href="./index.html">← Back</a>
  </div>

  <script>
    function toInt(v){
      const n = parseInt(String(v).trim(), 10);
      return Number.isFinite(n) ? n : NaN;
    }

    function randInt(min, max){
      const range = max - min + 1;
      if (range <= 0) throw new Error("bad range");

      if (window.crypto && crypto.getRandomValues){
        const arr = new Uint32Array(1);
        const maxUnbiased = Math.floor(0xFFFFFFFF / range) * range - 1;
        let x;
        do {
          crypto.getRandomValues(arr);
          x = arr[0];
        } while (x > maxUnbiased);
        return min + (x % range);
      }

      return min + Math.floor(Math.random() * range);
    }

    function sampleUnique(min, max, k){
      const n = max - min + 1;
      if (k > n) throw new Error("k too large");

      const pool = [];
      for (let i = 0; i < n; i++) pool.push(min + i);

      for (let i = 0; i < k; i++){
        const j = i + randInt(0, n - i - 1);
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }

      return pool.slice(0, k).sort((a,b) => a - b);
    }

    const balls = document.getElementById("balls");
    const toast = document.getElementById("toast");
    const copyBtn = document.getElementById("copy");
    const goBtn = document.getElementById("go");

    let lastNumbers = [];

    function setToast(msg){
      toast.textContent = msg;
      if (msg) setTimeout(() => { toast.textContent = ""; }, 1400);
    }

    function renderBalls(nums){
      balls.innerHTML = "";
      nums.forEach((num, index) => {
        const ball = document.createElement("div");
        ball.className = "ball";
        ball.style.animationDelay = `${index * 45}ms`;
        ball.textContent = String(num).padStart(2, "0");
        balls.appendChild(ball);
      });
    }

    function setBusy(isBusy){
      goBtn.disabled = isBusy;
      goBtn.textContent = isBusy ? "Rolling..." : "🍀 Pick";
      copyBtn.disabled = isBusy || lastNumbers.length === 0;
    }

    goBtn.addEventListener("click", () => {
      const k = toInt(document.getElementById("count").value);
      const a = toInt(document.getElementById("min").value);
      const b = toInt(document.getElementById("max").value);

      if (!Number.isFinite(k) || !Number.isFinite(a) || !Number.isFinite(b)){
        balls.innerHTML = '<div class="ball">!</div>';
        setToast("Enter whole numbers.");
        lastNumbers = [];
        copyBtn.disabled = true;
        return;
      }

      if (k <= 0){
        balls.innerHTML = '<div class="ball">!</div>';
        setToast("Count must be at least 1.");
        lastNumbers = [];
        copyBtn.disabled = true;
        return;
      }

      const min = Math.min(a,b);
      const max = Math.max(a,b);
      const size = max - min + 1;

      if (k > size){
        balls.innerHTML = '<div class="ball">!</div>';
        setToast(`Range too small for ${k} picks.`);
        lastNumbers = [];
        copyBtn.disabled = true;
        return;
      }

      setBusy(true);
      setToast("");
      balls.classList.add("loading");

      const endAt = performance.now() + 650;

      function shuffle(){
        const cap = Math.min(k, 12);
        renderBalls(sampleUnique(min, max, cap));

        if (performance.now() < endAt){
          requestAnimationFrame(shuffle);
          return;
        }

        balls.classList.remove("loading");
        lastNumbers = sampleUnique(min, max, k);
        renderBalls(lastNumbers);

        setBusy(false);
        copyBtn.disabled = false;

        if (navigator.vibrate) navigator.vibrate([30, 30, 70]);
      }

      requestAnimationFrame(shuffle);
    });

    copyBtn.addEventListener("click", async () => {
      if (!lastNumbers.length) return;

      const text = lastNumbers.join(" ");

      try{
        if (navigator.clipboard && window.isSecureContext){
          await navigator.clipboard.writeText(text);
          setToast("Copied!");
          return;
        }
      } catch {}

      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();

      try{
        document.execCommand("copy");
        setToast("Copied!");
      } catch {
        setToast("Copy failed — hold to select.");
      }

      document.body.removeChild(ta);
    });
  </script>
</body>
</html>
