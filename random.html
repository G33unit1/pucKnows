<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random Number Wheel</title>
  <style>
    html, body { height: 100%; margin: 0; }

    body{
      display:grid;
      place-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:#0b0b0b;
      color:#f5f5f5;
    }

    .wrap{
      width:min(520px, 92vw);
      text-align:center;
      padding:24px;
    }

    h1{
      margin:0 0 14px;
      font-size: clamp(22px, 5vw, 32px);
      opacity:.9;
      font-weight:700;
    }

    .card{
      background:#121212;
      border:1px solid #222;
      border-radius:20px;
      padding:18px;
      margin: 12px 0;
    }

    label{
      display:block;
      text-align:left;
      font-size:14px;
      opacity:.75;
      margin: 10px 0 6px;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:14px 12px;
      border-radius:14px;
      border:1px solid #2a2a2a;
      background:#0b0b0b;
      color:#f5f5f5;
      font-size:18px;
    }

    .wheel-area{
      position:relative;
      width:240px;
      height:240px;
      margin:24px auto 18px;
    }

    .pointer{
      position:absolute;
      top:-8px;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:16px solid transparent;
      border-right:16px solid transparent;
      border-top:28px solid #f5f5f5;
      z-index:3;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
    }

    .wheel{
      width:100%;
      height:100%;
      border-radius:50%;
      background:
        conic-gradient(
          #f5f5f5 0deg 45deg,
          #2a2a2a 45deg 90deg,
          #f5f5f5 90deg 135deg,
          #2a2a2a 135deg 180deg,
          #f5f5f5 180deg 225deg,
          #2a2a2a 225deg 270deg,
          #f5f5f5 270deg 315deg,
          #2a2a2a 315deg 360deg
        );
      border:8px solid #1d1d1d;
      box-shadow:
        0 0 0 1px #333,
        0 18px 50px rgba(0,0,0,.45);
      display:grid;
      place-items:center;
      transition: transform 3.2s cubic-bezier(.12,.82,.22,1);
    }

    .wheel::after{
      content:"";
      width:82px;
      height:82px;
      border-radius:50%;
      background:#0b0b0b;
      border:1px solid #333;
      position:absolute;
    }

    .wheel-number{
      position:relative;
      z-index:2;
      color:#f5f5f5;
      font-size:42px;
      font-weight:900;
      text-shadow:0 2px 10px rgba(0,0,0,.65);
    }

    .btn{
      width:100%;
      border:0;
      color:#0b0b0b;
      background:#f5f5f5;
      padding:16px 14px;
      border-radius:16px;
      font-size:18px;
      font-weight:750;
      margin-top: 12px;
      cursor:pointer;
    }

    .btn:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .out{
      margin-top: 14px;
      font-size: clamp(24px, 7vw, 40px);
      font-weight: 800;
      letter-spacing: .5px;
      min-height: 48px;
    }

    .hint{
      margin-top:14px;
      font-size:14px;
      opacity:.55;
    }

    a.back{
      display:inline-block;
      margin-top: 16px;
      color:#f5f5f5;
      opacity:.7;
      text-decoration:none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Random number</h1>

    <div class="card">
      <label for="min">Min</label>
      <input id="min" inputmode="numeric" value="1" />

      <label for="max">Max</label>
      <input id="max" inputmode="numeric" value="100" />

      <div class="wheel-area">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
          <div class="wheel-number" id="wheelNumber">?</div>
        </div>
      </div>

      <button class="btn" id="go">Spin</button>

      <div class="out" id="out">—</div>
      <div class="hint">Whole number, inclusive of Min & Max.</div>
    </div>

    <a class="back" href="./index.html">← Back</a>
  </div>

  <script>
    function toInt(v){
      const n = parseInt(String(v).trim(), 10);
      return Number.isFinite(n) ? n : NaN;
    }

    function randInt(min, max){
      const range = max - min + 1;
      if (range <= 0) throw new Error("bad range");

      if (window.crypto && crypto.getRandomValues){
        const arr = new Uint32Array(1);
        const maxUnbiased = Math.floor(0xFFFFFFFF / range) * range - 1;
        let x;
        do {
          crypto.getRandomValues(arr);
          x = arr[0];
        } while (x > maxUnbiased);
        return min + (x % range);
      }

      return min + Math.floor(Math.random() * range);
    }

    const out = document.getElementById("out");
    const go = document.getElementById("go");
    const wheel = document.getElementById("wheel");
    const wheelNumber = document.getElementById("wheelNumber");

    let currentRotation = 0;
    let spinTimer = null;

    go.addEventListener("click", () => {
      const a = toInt(document.getElementById("min").value);
      const b = toInt(document.getElementById("max").value);

      if (!Number.isFinite(a) || !Number.isFinite(b)){
        out.textContent = "Enter whole numbers.";
        return;
      }

      const min = Math.min(a,b);
      const max = Math.max(a,b);

      try {
        const finalNumber = randInt(min, max);

        go.disabled = true;
        out.textContent = "Spinning...";
        wheelNumber.textContent = "?";

        clearInterval(spinTimer);

        spinTimer = setInterval(() => {
          wheelNumber.textContent = randInt(min, max);
        }, 80);

        const extraSpins = 360 * 6;
        const randomStop = randInt(0, 359);

        currentRotation += extraSpins + randomStop;
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          clearInterval(spinTimer);
          wheelNumber.textContent = finalNumber;
          out.textContent = finalNumber;
          go.disabled = false;

          if (navigator.vibrate) {
            navigator.vibrate([40, 40, 80]);
          }
        }, 3200);

      } catch {
        out.textContent = "Invalid range.";
      }
    });
  </script>
</body>
</html>
