<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random Number</title>

  <style>
    html, body { height:100%; margin:0; }

    body{
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:radial-gradient(circle at top,#1b1b1b,#070707 60%);
      color:#f5f5f5;
    }

    .wrap{
      width:min(520px,92vw);
      text-align:center;
      padding:24px;
    }

    h1{
      margin:0 0 24px;
      font-size:clamp(28px,7vw,44px);
      font-weight:950;
      letter-spacing:-.05em;
    }

    .card{
      background:linear-gradient(180deg,#151515,#0f0f0f);
      border:1px solid #242424;
      border-radius:30px;
      padding:24px;
      box-shadow:0 24px 80px rgba(0,0,0,.55);
    }

    label{
      display:block;
      text-align:left;
      font-size:16px;
      opacity:.7;
      margin:14px 0 8px;
      font-weight:750;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:18px 20px;
      border-radius:22px;
      border:1px solid #2e2e2e;
      background:#080808;
      color:#f5f5f5;
      font-size:28px;
      outline:none;
    }

    input:focus{
      border-color:#5fd7ff;
      box-shadow:0 0 0 3px rgba(95,215,255,.15);
    }

    .puck-area{
      position:relative;
      width:285px;
      height:285px;
      margin:34px auto 26px;
      display:grid;
      place-items:center;
    }

    .pointer{
      position:absolute;
      top:-14px;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:22px solid transparent;
      border-right:22px solid transparent;
      border-top:42px solid #f4f4f4;
      z-index:5;
      filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));
      transform-origin:50% 20%;
    }

    .pointer.tick{
      animation:pointerTick .12s ease;
    }

    @keyframes pointerTick{
      0%{ transform:translateX(-50%) rotate(0deg); }
      50%{ transform:translateX(-50%) rotate(12deg); }
      100%{ transform:translateX(-50%) rotate(0deg); }
    }

    .puck{
      width:100%;
      height:100%;
      border-radius:50%;
      position:relative;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:#050505;
      border:8px solid #222;
      box-shadow:
        inset 0 0 25px rgba(255,255,255,.08),
        inset 0 0 60px rgba(0,0,0,.5),
        0 0 0 2px #333,
        0 24px 60px rgba(0,0,0,.75);
      transition:
        transform 3.6s cubic-bezier(.08,.82,.18,1),
        box-shadow .3s,
        filter .3s;
    }

    .puck::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:radial-gradient(circle at 35% 22%, rgba(255,255,255,.18), transparent 28%);
      pointer-events:none;
    }

    .puck.spinning{
      box-shadow:
        inset 0 0 25px rgba(255,255,255,.08),
        inset 0 0 60px rgba(0,0,0,.5),
        0 0 0 2px #333,
        0 0 42px rgba(95,215,255,.75),
        0 24px 70px rgba(0,0,0,.85);
      filter:blur(.15px);
    }

    .puck-logo{
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scale(1.08);
    }

    .btn{
      width:100%;
      border:0;
      color:#050505;
      background:linear-gradient(180deg,#ffffff,#e7e7e7);
      padding:19px 16px;
      border-radius:24px;
      font-size:22px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 12px 30px rgba(255,255,255,.08);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .out{
      margin-top:24px;
      font-size:clamp(42px,12vw,72px);
      font-weight:950;
      min-height:82px;
      opacity:1;
      transform:scale(1);
      transition:.35s ease;
    }

    .out.win{
      animation:winPop .45s ease;
      text-shadow:0 0 34px rgba(95,215,255,.75);
    }

    @keyframes winPop{
      0%{ transform:scale(.85); opacity:.4; }
      45%{ transform:scale(1.16); opacity:1; }
      100%{ transform:scale(1); opacity:1; }
    }

    .hint{
      margin-top:16px;
      font-size:16px;
      opacity:.45;
    }

    a.back{
      display:inline-block;
      margin-top:28px;
      color:#f5f5f5;
      opacity:.65;
      text-decoration:none;
      font-size:20px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Random number</h1>

    <div class="card">
      <label for="min">Min</label>
      <input id="min" inputmode="numeric" value="1" />

      <label for="max">Max</label>
      <input id="max" inputmode="numeric" value="100" />

      <div class="puck-area">
        <div class="pointer" id="pointer"></div>

        <div class="puck" id="puck">
          <img class="puck-logo" src="./logo.png" alt="PucKnows logo">
        </div>
      </div>

      <button class="btn" id="go">🎲 SPIN THE PUCK</button>

      <div class="out" id="out">—</div>
      <div class="hint">Whole number, inclusive of Min & Max.</div>
    </div>

    <a class="back" href="./index.html">← Back</a>
  </div>

  <script>
    function toInt(v){
      const n = parseInt(String(v).trim(), 10);
      return Number.isFinite(n) ? n : NaN;
    }

    function randInt(min, max){
      const range = max - min + 1;
      if (range <= 0) throw new Error("bad range");

      if (window.crypto && crypto.getRandomValues){
        const arr = new Uint32Array(1);
        const maxUnbiased = Math.floor(0xFFFFFFFF / range) * range - 1;
        let x;

        do {
          crypto.getRandomValues(arr);
          x = arr[0];
        } while (x > maxUnbiased);

        return min + (x % range);
      }

      return min + Math.floor(Math.random() * range);
    }

    const out = document.getElementById("out");
    const go = document.getElementById("go");
    const puck = document.getElementById("puck");
    const pointer = document.getElementById("pointer");

    let currentRotation = 0;
    let numberTimer = null;
    let tickTimer = null;

    function tickPointer(){
      pointer.classList.remove("tick");
      void pointer.offsetWidth;
      pointer.classList.add("tick");

      if (navigator.vibrate) {
        navigator.vibrate(8);
      }
    }

    go.addEventListener("click", () => {
      const a = toInt(document.getElementById("min").value);
      const b = toInt(document.getElementById("max").value);

      if (!Number.isFinite(a) || !Number.isFinite(b)){
        out.textContent = "Enter whole numbers.";
        return;
      }

      const min = Math.min(a,b);
      const max = Math.max(a,b);

      try {
        const finalNumber = randInt(min, max);

        go.disabled = true;
        go.textContent = "SPINNING...";
        out.classList.remove("win");
        out.textContent = "Spinning...";
        puck.classList.add("spinning");

        clearInterval(numberTimer);
        clearInterval(tickTimer);

        numberTimer = setInterval(() => {
          out.textContent = randInt(min, max);
        }, 65);

        tickTimer = setInterval(tickPointer, 130);

        const extraSpins = 360 * 7;
        const randomStop = randInt(0, 359);
        currentRotation += extraSpins + randomStop;

        puck.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          clearInterval(numberTimer);
          clearInterval(tickTimer);

          out.textContent = finalNumber;
          out.classList.add("win");
  
const sound = document.getElementById("resultSound");
if (sound) {
    sound.currentTime = 0;
    sound.play().catch(() => {});
}

          puck.classList.remove("spinning");

          go.disabled = false;
          go.textContent = "🎲 SPIN THE PUCK";

          if (navigator.vibrate) {
            navigator.vibrate([40, 40, 90]);
          }
        }, 3600);

      } catch {
        out.textContent = "Invalid range.";
      }
    });
  </script>
  
  <audio id="resultSound" src="ding.mp3" preload="auto"></audio>
  
</body>
</html>
