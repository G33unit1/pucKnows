<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random Number</title>

  <style>
    html, body { height:100%; margin:0; }

    body{
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:#08090c;
      color:#f5f5f5;
    }

    .wrap{
      width:min(520px,92vw);
      text-align:center;
      padding:24px;
    }

    h1{
      margin:0 0 24px;
      font-size:clamp(26px,6vw,38px);
      font-weight:850;
    }

    .card{
      background:linear-gradient(180deg,#151515,#0f0f0f);
      border:1px solid #242424;
      border-radius:28px;
      padding:24px;
      box-shadow:0 24px 80px rgba(0,0,0,.45);
    }

    label{
      display:block;
      text-align:left;
      font-size:16px;
      opacity:.7;
      margin:14px 0 8px;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:18px 20px;
      border-radius:22px;
      border:1px solid #2e2e2e;
      background:#080808;
      color:#f5f5f5;
      font-size:28px;
      outline:none;
    }

    input:focus{
      border-color:#5fd7ff;
      box-shadow:0 0 0 3px rgba(95,215,255,.15);
    }

    .puck-area{
      position:relative;
      width:285px;
      height:285px;
      margin:34px auto 26px;
      display:grid;
      place-items:center;
    }

    .pointer{
      position:absolute;
      top:-14px;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:22px solid transparent;
      border-right:22px solid transparent;
      border-top:42px solid #f4f4f4;
      z-index:5;
      filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));
      transform-origin:50% 20%;
    }

    .pointer.tick{
      animation:pointerTick .12s ease;
    }

    @keyframes pointerTick{
      0%{ transform:translateX(-50%) rotate(0deg); }
      50%{ transform:translateX(-50%) rotate(12deg); }
      100%{ transform:translateX(-50%) rotate(0deg); }
    }

    .puck{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,.16), transparent 22%),
        conic-gradient(
          #202020 0deg 45deg,
          #f2f2f2 45deg 90deg,
          #202020 90deg 135deg,
          #f2f2f2 135deg 180deg,
          #202020 180deg 225deg,
          #f2f2f2 225deg 270deg,
          #202020 270deg 315deg,
          #f2f2f2 315deg 360deg
        );
      border:10px solid #222;
      box-shadow:
        inset 0 0 25px rgba(255,255,255,.08),
        inset 0 0 60px rgba(0,0,0,.5),
        0 0 0 2px #333,
        0 24px 60px rgba(0,0,0,.75);
      display:grid;
      place-items:center;
      transition:transform 3.6s cubic-bezier(.08,.82,.18,1), filter .3s;
    }

    .puck.spinning{
      box-shadow:
        inset 0 0 25px rgba(255,255,255,.08),
        inset 0 0 60px rgba(0,0,0,.5),
        0 0 0 2px #333,
        0 0 35px rgba(95,215,255,.55),
        0 24px 70px rgba(0,0,0,.85);
      filter:blur(.2px);
    }

    .centre{
      position:absolute;
      width:112px;
      height:112px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 25%, #1b1b1b, #050505 70%);
      border:1px solid #303030;
      display:grid;
      place-items:center;
      box-shadow:
        inset 0 0 20px rgba(255,255,255,.06),
        0 12px 26px rgba(0,0,0,.7);
      z-index:3;
    }

    .centre.win{
      animation:winPop .45s ease;
      box-shadow:
        inset 0 0 20px rgba(255,255,255,.08),
        0 0 34px rgba(95,215,255,.75),
        0 12px 26px rgba(0,0,0,.7);
    }

    @keyframes winPop{
      0%{ transform:scale(1); }
      45%{ transform:scale(1.14); }
      100%{ transform:scale(1); }
    }

    .wheel-number{
      font-size:48px;
      font-weight:950;
      color:#fff;
      text-shadow:0 0 18px rgba(255,255,255,.2);
    }

    .btn{
      width:100%;
      border:0;
      color:#050505;
      background:linear-gradient(180deg,#ffffff,#e7e7e7);
      padding:19px 16px;
      border-radius:24px;
      font-size:22px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 12px 30px rgba(255,255,255,.08);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .out{
      margin-top:24px;
      font-size:clamp(34px,9vw,54px);
      font-weight:950;
      min-height:62px;
    }

    .hint{
      margin-top:16px;
      font-size:16px;
      opacity:.45;
    }

    a.back{
      display:inline-block;
      margin-top:28px;
      color:#f5f5f5;
      opacity:.65;
      text-decoration:none;
      font-size:20px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Random number</h1>

    <div class="card">
      <label for="min">Min</label>
      <input id="min" inputmode="numeric" value="1" />

      <label for="max">Max</label>
      <input id="max" inputmode="numeric" value="100" />

      <div class="puck-area">
        <div class="pointer" id="pointer"></div>

        <div class="puck" id="puck">
          <div class="centre" id="centre">
            <div class="wheel-number" id="wheelNumber">?</div>
          </div>
        </div>
      </div>

      <button class="btn" id="go">🎲 SPIN THE PUCK</button>

      <div class="out" id="out">—</div>
      <div class="hint">Whole number, inclusive of Min & Max.</div>
    </div>

    <a class="back" href="./index.html">← Back</a>
  </div>

  <script>
    function toInt(v){
      const n = parseInt(String(v).trim(), 10);
      return Number.isFinite(n) ? n : NaN;
    }

    function randInt(min, max){
      const range = max - min + 1;
      if (range <= 0) throw new Error("bad range");

      if (window.crypto && crypto.getRandomValues){
        const arr = new Uint32Array(1);
        const maxUnbiased = Math.floor(0xFFFFFFFF / range) * range - 1;
        let x;
        do {
          crypto.getRandomValues(arr);
          x = arr[0];
        } while (x > maxUnbiased);
        return min + (x % range);
      }

      return min + Math.floor(Math.random() * range);
    }

    const out = document.getElementById("out");
    const go = document.getElementById("go");
    const puck = document.getElementById("puck");
    const centre = document.getElementById("centre");
    const pointer = document.getElementById("pointer");
    const wheelNumber = document.getElementById("wheelNumber");

    let currentRotation = 0;
    let numberTimer = null;
    let tickTimer = null;

    function tickPointer(){
      pointer.classList.remove("tick");
      void pointer.offsetWidth;
      pointer.classList.add("tick");

      if (navigator.vibrate) {
        navigator.vibrate(8);
      }
    }

    go.addEventListener("click", () => {
      const a = toInt(document.getElementById("min").value);
      const b = toInt(document.getElementById("max").value);

      if (!Number.isFinite(a) || !Number.isFinite(b)){
        out.textContent = "Enter whole numbers.";
        return;
      }

      const min = Math.min(a,b);
      const max = Math.max(a,b);

      try {
        const finalNumber = randInt(min, max);

        go.disabled = true;
        go.textContent = "SPINNING...";
        out.textContent = "Spinning...";
        centre.classList.remove("win");
        puck.classList.add("spinning");

        clearInterval(numberTimer);
        clearInterval(tickTimer);

        numberTimer = setInterval(() => {
          wheelNumber.textContent = randInt(min, max);
        }, 65);

        tickTimer = setInterval(tickPointer, 130);

        const extraSpins = 360 * 7;
        const randomStop = randInt(0, 359);
        currentRotation += extraSpins + randomStop;

        puck.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          clearInterval(numberTimer);
          clearInterval(tickTimer);

          wheelNumber.textContent = finalNumber;
          out.textContent = finalNumber;

          puck.classList.remove("spinning");
          centre.classList.add("win");

          go.disabled = false;
          go.textContent = "🎲 SPIN THE PUCK";

          if (navigator.vibrate) {
            navigator.vibrate([40, 40, 90]);
          }
        }, 3600);

      } catch {
        out.textContent = "Invalid range.";
      }
    });
  </script>
</body>
</html>
